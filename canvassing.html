<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Canvassing Nanterre</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', Arial, sans-serif; }
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

/* Contrôles carte */
#search-bar {
    position: fixed; top: 10px; left: 50px; right: 50px; z-index: 1000;
    display: flex; gap: 6px;
}
#search-input {
    flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px;
    font-size: 15px; font-family: inherit; background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
#search-input:focus { outline: none; border-color: #c62828; }
#btn-locate, #btn-back {
    width: 44px; height: 44px; border: none; border-radius: 8px;
    background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    font-size: 20px; cursor: pointer; flex-shrink: 0;
}
#btn-back { display: none; position: fixed; top: 10px; left: 6px; z-index: 1001; }

/* Stats en bas */
#stats-bar {
    position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 1000;
    display: flex; gap: 8px; justify-content: center;
}
.stat-chip {
    background: white; padding: 6px 14px; border-radius: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15); font-size: 13px; font-weight: 600;
}
.stat-chip .num { font-size: 16px; font-weight: 700; }
.stat-chip.pap { color: #c62828; }
.stat-chip.boi { color: #1565c0; }

/* Marqueurs adresse */
.marker-default { background: #bbb; border: 2px solid white; border-radius: 50%;
    width: 10px; height: 10px; margin: -5px 0 0 -5px; }
.marker-pap { background: #c62828; border: 2px solid white; border-radius: 50%;
    width: 12px; height: 12px; margin: -6px 0 0 -6px; }
.marker-boi { background: #1565c0; border: 2px solid white; border-radius: 50%;
    width: 12px; height: 12px; margin: -6px 0 0 -6px; }
.marker-both { background: #6a1b9a; border: 2px solid white; border-radius: 50%;
    width: 12px; height: 12px; margin: -6px 0 0 -6px; }

/* Bottom sheet mobile */
#mobile-backdrop {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3); z-index: 1999;
}
#mobile-overlay {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: white; z-index: 2000; border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2); padding: 20px;
    max-height: 60vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#mobile-overlay .mo-handle {
    width: 40px; height: 4px; background: #ddd; border-radius: 2px;
    margin: 0 auto 12px;
}
#mobile-overlay h3 { font-size: 18px; margin-bottom: 4px; }
#mobile-overlay .mo-addr { color: #888; font-size: 14px; margin-bottom: 6px; }
#mobile-overlay .mo-history { color: #888; font-size: 13px; margin-bottom: 12px; }
#mobile-overlay .btn-row { display: flex; gap: 10px; }
#mobile-overlay .btn-action {
    flex: 1; padding: 14px; border: 2px solid #ddd; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer; text-align: center;
    font-family: inherit; background: white;
}
#mobile-overlay .btn-action.pap { border-color: #ef9a9a; color: #c62828; }
#mobile-overlay .btn-action.pap:active { background: #fbe9e7; }
#mobile-overlay .btn-action.boi { border-color: #90caf9; color: #1565c0; }
#mobile-overlay .btn-action.boi:active { background: #e3f2fd; }

/* Popup desktop */
.addr-popup { font-family: 'Source Sans 3', Arial, sans-serif; min-width: 220px; }
.addr-popup h3 { font-size: 15px; margin-bottom: 2px; }
.addr-popup .popup-rue { color: #888; font-size: 13px; margin-bottom: 4px; }
.addr-popup .popup-history { color: #888; font-size: 12px; margin-bottom: 8px; }
.addr-popup .btn-row { display: flex; gap: 6px; }
.addr-popup .btn-action {
    flex: 1; padding: 10px 8px; border: 2px solid #ddd; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
    font-family: inherit; background: white;
}
.addr-popup .btn-action.pap { border-color: #ef9a9a; color: #c62828; }
.addr-popup .btn-action.boi { border-color: #90caf9; color: #1565c0; }
.btn-undo { background: none; border: none; color: #999; font-size: 12px;
    cursor: pointer; padding: 2px 6px; font-family: inherit; }
.btn-undo:hover { color: #c62828; }

/* Cacher les contrôles zoom leaflet */
.leaflet-control-zoom { display: none !important; }
/* Supprimer le rectangle de focus/tap sur les polygones */
.leaflet-interactive { outline: none !important; }
.leaflet-interactive:focus { outline: none !important; }
path.leaflet-interactive { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<div id="map"></div>
<button id="btn-back" onclick="zoomOut()">&#8592;</button>

<div id="search-bar">
    <input id="search-input" type="text" placeholder="Rechercher une adresse...">
    <button id="btn-locate" title="Ma position">&#128205;</button>
</div>

<div id="stats-bar">
    <div class="stat-chip pap"><span class="num" id="count-pap">0</span> PàP</div>
    <div class="stat-chip boi"><span class="num" id="count-boi">0</span> boîtages</div>
</div>

<div id="mobile-backdrop" onclick="closeMobilePopup()"></div>
<div id="mobile-overlay">
    <div class="mo-handle"></div>
    <h3 id="mo-title"></h3>
    <div class="mo-addr" id="mo-addr"></div>
    <div class="mo-history" id="mo-history"></div>
    <div class="btn-row">
        <div style="flex:1;text-align:center;">
            <button class="btn-action pap" style="width:100%;" onclick="addVisite('pap')">+ Porte-à-porte</button>
            <button class="btn-undo" id="mo-undo-pap" onclick="undoVisite('pap')" style="display:none;">Annuler dernière</button>
        </div>
        <div style="flex:1;text-align:center;">
            <button class="btn-action boi" style="width:100%;" onclick="addVisite('boi')">+ Boîtage</button>
            <button class="btn-undo" id="mo-undo-boi" onclick="undoVisite('boi')" style="display:none;">Annuler dernière</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://htprfzzqjqfzyqcbjynz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cHJmenpxanFmenlxY2JqeW56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyOTI1MTEsImV4cCI6MjA5OTg2ODUxMX0.HtHvc7_OGAidJ0XSnlKnx3d6tfrPTxbkFUaLsEv5nbE';
const SB_HEADERS = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json'
};

// ============================================================
// STATE
// ============================================================
let ADDRESSES = [];
let BUREAUX = null;
// visites[address_id] = { pap: { count, last_date }, boi: { count, last_date } }
let visites = {};
let markers = {};
let addressLayer = null;
let bureauLayer = null;
let currentAddrId = null;
let currentBureau = null;
let map;

// ============================================================
// DATA LOADING
// ============================================================
async function loadAddresses() {
    const resp = await fetch('adresses_nanterre.json');
    ADDRESSES = await resp.json();
}

async function loadBureaux() {
    const resp = await fetch('bureaux_vote.geojson');
    BUREAUX = await resp.json();
}

async function loadVisites() {
    try {
        const resp = await fetch(`${SUPABASE_URL}/rest/v1/visites?select=*`, {
            headers: SB_HEADERS
        });
        const rows = await resp.json();
        if (Array.isArray(rows)) {
            rows.forEach(r => {
                if (!visites[r.address_id]) visites[r.address_id] = {};
                visites[r.address_id][r.type] = {
                    count: r.count || 1,
                    last_date: r.last_date
                };
            });
        }
    } catch(e) {
        console.error('Supabase load error:', e);
    }
}

// ============================================================
// PERSISTENCE
// ============================================================
async function addVisite(type) {
    if (!currentAddrId) return;
    if (!visites[currentAddrId]) visites[currentAddrId] = {};
    const prev = visites[currentAddrId][type];
    const newCount = prev ? prev.count + 1 : 1;
    const now = new Date().toISOString();
    visites[currentAddrId][type] = { count: newCount, last_date: now };

    // Upsert dans Supabase
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/visites`, {
            method: 'POST',
            headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({
                address_id: currentAddrId,
                type: type,
                count: newCount,
                last_date: now
            })
        });
    } catch(e) { console.error('Supabase save error:', e); }

    updateMarkerStyle(currentAddrId);
    updateStats();
    refreshPopup();
}

async function undoVisite(type) {
    if (!currentAddrId) return;
    const v = visites[currentAddrId];
    if (!v || !v[type] || v[type].count <= 0) return;

    const newCount = v[type].count - 1;

    if (newCount === 0) {
        delete v[type];
        if (Object.keys(v).length === 0) delete visites[currentAddrId];
        try {
            await fetch(
                `${SUPABASE_URL}/rest/v1/visites?address_id=eq.${currentAddrId}&type=eq.${type}`,
                { method: 'DELETE', headers: SB_HEADERS }
            );
        } catch(e) { console.error('Supabase delete error:', e); }
    } else {
        v[type].count = newCount;
        try {
            await fetch(`${SUPABASE_URL}/rest/v1/visites`, {
                method: 'POST',
                headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
                body: JSON.stringify({
                    address_id: currentAddrId, type: type,
                    count: newCount, last_date: v[type].last_date
                })
            });
        } catch(e) { console.error('Supabase save error:', e); }
    }

    updateMarkerStyle(currentAddrId);
    updateStats();
    refreshPopup();
}

// ============================================================
// MARKER STYLES
// ============================================================
function getMarkerClass(addrId) {
    const v = visites[addrId] || {};
    if (v.pap && v.boi) return 'marker-both';
    if (v.pap) return 'marker-pap';
    if (v.boi) return 'marker-boi';
    return 'marker-default';
}

function updateMarkerStyle(addrId) {
    const m = markers[addrId];
    if (!m) return;
    m.setIcon(L.divIcon({ className: getMarkerClass(addrId) }));
}

// ============================================================
// HISTORY TEXT
// ============================================================
function historyText(addrId) {
    const v = visites[addrId] || {};
    const parts = [];
    if (v.pap) {
        const d = new Date(v.pap.last_date).toLocaleDateString('fr-FR');
        parts.push(`PàP : ${v.pap.count} visite${v.pap.count > 1 ? 's' : ''} (dernière : ${d})`);
    }
    if (v.boi) {
        const d = new Date(v.boi.last_date).toLocaleDateString('fr-FR');
        parts.push(`Boîtage : ${v.boi.count} passage${v.boi.count > 1 ? 's' : ''} (dernier : ${d})`);
    }
    return parts.length ? parts.join('<br>') : 'Aucune visite';
}

// ============================================================
// POPUPS
// ============================================================
function isMobile() { return window.innerWidth <= 768; }

function refreshPopup() {
    if (!currentAddrId) return;
    const addr = ADDRESSES.find(a => a.id === currentAddrId);
    if (!addr) return;
    const v = visites[addr.id] || {};

    if (isMobile()) {
        document.getElementById('mo-history').innerHTML = historyText(addr.id);
        document.getElementById('mo-undo-pap').style.display = v.pap ? '' : 'none';
        document.getElementById('mo-undo-boi').style.display = v.boi ? '' : 'none';
    } else {
        const m = markers[addr.id];
        if (m && m.getPopup() && m.getPopup().isOpen()) {
            m.getPopup().setContent(createPopupHTML(addr));
        }
    }
}

function openAddrPopup(addr) {
    currentAddrId = addr.id;
    if (isMobile()) {
        const v = visites[addr.id] || {};
        const lgts = addr.lgts || 1;
        document.getElementById('mo-title').textContent = addr.adr;
        document.getElementById('mo-addr').textContent = `${addr.rue} — ~${lgts} logement${lgts > 1 ? 's' : ''}`;
        document.getElementById('mo-history').innerHTML = historyText(addr.id);
        document.getElementById('mo-undo-pap').style.display = v.pap ? '' : 'none';
        document.getElementById('mo-undo-boi').style.display = v.boi ? '' : 'none';
        document.getElementById('mobile-overlay').style.display = 'block';
        document.getElementById('mobile-backdrop').style.display = 'block';
    }
}

function closeMobilePopup() {
    document.getElementById('mobile-overlay').style.display = 'none';
    document.getElementById('mobile-backdrop').style.display = 'none';
    currentAddrId = null;
}

function createPopupHTML(addr) {
    const v = visites[addr.id] || {};
    const lgts = addr.lgts || 1;
    return `<div class="addr-popup">
        <h3>${addr.adr}</h3>
        <div class="popup-rue">${addr.rue} — ~${lgts} logement${lgts > 1 ? 's' : ''}</div>
        <div class="popup-history">${historyText(addr.id)}</div>
        <div class="btn-row">
            <div style="flex:1;text-align:center;">
                <button class="btn-action pap" style="width:100%;"
                    onclick="currentAddrId='${addr.id}';addVisite('pap');">+ PàP</button>
                ${v.pap ? `<button class="btn-undo"
                    onclick="currentAddrId='${addr.id}';undoVisite('pap');">Annuler</button>` : ''}
            </div>
            <div style="flex:1;text-align:center;">
                <button class="btn-action boi" style="width:100%;"
                    onclick="currentAddrId='${addr.id}';addVisite('boi');">+ Boîtage</button>
                ${v.boi ? `<button class="btn-undo"
                    onclick="currentAddrId='${addr.id}';undoVisite('boi');">Annuler</button>` : ''}
            </div>
        </div>
    </div>`;
}

// ============================================================
// MAP — Vue bureau de vote
// ============================================================
function buildMap() {
    map = L.map('map', { zoomControl: false }).setView([48.8925, 2.2052], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OSM, CARTO', maxZoom: 19
    }).addTo(map);

    map.on('click', function(e) {
        if (!currentBureau) return;
        const pt = [e.latlng.lng, e.latlng.lat];
        let clickedInBureau = false;
        for (const f of BUREAUX.features) {
            if (f.properties.bureau === currentBureau && pointInPolygon(pt, f.geometry)) {
                clickedInBureau = true;
                break;
            }
        }
        if (!clickedInBureau) zoomOut();
    });

    showBureaux();
}

function showBureaux() {
    if (bureauLayer) map.removeLayer(bureauLayer);
    if (addressLayer) { map.removeLayer(addressLayer); addressLayer = null; }

    bureauLayer = L.geoJSON(BUREAUX, {
        style: function(feature) {
            const bId = feature.properties.bureau;
            const stats = bureauStats(bId);
            const pct = Math.max(stats.pctPap, stats.pctBoi);
            const color = pct > 0 ? '#2e7d32' : '#e0e0e0';
            return {
                fillColor: color,
                fillOpacity: Math.min(0.1 + pct / 100 * 0.6, 0.7),
                color: '#555', weight: 1.5
            };
        },
        onEachFeature: function(feature, layer) {
            const b = feature.properties;
            const stats = bureauStats(b.bureau);
            layer.bindTooltip(
                `<b>Bureau ${b.bureau}</b><br>${b.nom}<br>` +
                `~${stats.totalLgts} logements estimés<br>` +
                `PàP : ${stats.pctPap}% couvert (${stats.papCount} visites)<br>` +
                `Boîtage : ${stats.pctBoi}% couvert (${stats.boiCount} passages)`,
                { sticky: true, className: 'bureau-tooltip' }
            );
            layer.on('click', function(e) {
                L.DomEvent.stopPropagation(e);
                if (currentBureau && currentBureau !== b.bureau) {
                    zoomOut();
                } else if (!currentBureau) {
                    zoomToBureau(b.bureau, layer);
                }
            });
        }
    }).addTo(map);

    currentBureau = null;
    document.getElementById('btn-back').style.display = 'none';
    map.setView([48.8925, 2.2052], 14);
}

function bureauStats(bureauId) {
    const bureauAddrs = ADDRESSES.filter(a => a._bureau === bureauId);
    const totalLgts = bureauAddrs.reduce((s, a) => s + (a.lgts || 1), 0);
    let lgtsPap = 0, lgtsBoi = 0, papCount = 0, boiCount = 0;
    Object.entries(visites).forEach(([addrId, v]) => {
        const addr = bureauAddrs.find(a => a.id === addrId);
        if (!addr) return;
        const lgts = addr.lgts || 1;
        if (v.pap) { lgtsPap += lgts; papCount += v.pap.count; }
        if (v.boi) { lgtsBoi += lgts; boiCount += v.boi.count; }
    });
    return {
        totalLgts, papCount, boiCount,
        total: papCount + boiCount,
        pctPap: totalLgts ? Math.round(lgtsPap / totalLgts * 100) : 0,
        pctBoi: totalLgts ? Math.round(lgtsBoi / totalLgts * 100) : 0,
    };
}

function isInBureau(addr, bureauId) {
    // Utilise le pré-calcul si disponible
    if (addr._bureau !== undefined) return addr._bureau === bureauId;
    return false;
}

function precomputeBureaux() {
    // Assigne chaque adresse à son bureau de vote
    if (!BUREAUX) return;
    const features = BUREAUX.features;
    ADDRESSES.forEach(addr => {
        const pt = [addr.lon, addr.lat];
        for (const f of features) {
            if (pointInPolygon(pt, f.geometry)) {
                addr._bureau = f.properties.bureau;
                return;
            }
        }
        addr._bureau = null;
    });
}

function pointInPolygon(pt, geometry) {
    const coords = geometry.type === 'MultiPolygon'
        ? geometry.coordinates.flat()
        : geometry.coordinates;
    for (const ring of coords) {
        if (pipRing(pt, ring)) return true;
    }
    return false;
}

function pipRing(pt, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        if (((yi > pt[1]) !== (yj > pt[1])) &&
            (pt[0] < (xj - xi) * (pt[1] - yi) / (yj - yi) + xi)) {
            inside = !inside;
        }
    }
    return inside;
}

// ============================================================
// MAP — Vue adresses d'un bureau
// ============================================================
function zoomToBureau(bureauId, layer) {
    currentBureau = bureauId;
    map.fitBounds(layer.getBounds(), { padding: [20, 20] });

    // Masquer les autres bureaux, garder celui-ci en surbrillance
    bureauLayer.eachLayer(function(l) {
        if (l.feature.properties.bureau === bureauId) {
            l.setStyle({ color: '#c62828', weight: 3, fillOpacity: 0.05 });
        } else {
            l.setStyle({ fillOpacity: 0, weight: 0.5, color: '#ccc' });
        }
    });

    // Afficher les adresses de ce bureau
    showAddressesForBureau(bureauId);
    document.getElementById('btn-back').style.display = 'block';
}

function showAddressesForBureau(bureauId) {
    if (addressLayer) map.removeLayer(addressLayer);
    addressLayer = L.layerGroup();

    const addrs = ADDRESSES.filter(a => a._bureau === bureauId);
    addrs.forEach(addr => {
        const cls = getMarkerClass(addr.id);
        const m = L.marker([addr.lat, addr.lon], {
            icon: L.divIcon({ className: cls })
        });

        m.on('click', function() {
            if (isMobile()) {
                openAddrPopup(addr);
            } else {
                currentAddrId = addr.id;
                m.unbindPopup();
                m.bindPopup(createPopupHTML(addr), { maxWidth: 260 }).openPopup();
            }
        });

        markers[addr.id] = m;
        addressLayer.addLayer(m);
    });

    addressLayer.addTo(map);
}

function zoomOut() {
    showBureaux();
}

// ============================================================
// RECHERCHE + GÉOLOC
// ============================================================
const searchInput = document.getElementById('search-input');

searchInput.addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (q.length < 3) return;

    const results = ADDRESSES.filter(a => a.adr.toLowerCase().includes(q)).slice(0, 5);
    if (results.length > 0) {
        const a = results[0];
        if (a._bureau) {
            const layer = findBureauLayer(a._bureau);
            if (layer) zoomToBureau(a._bureau, layer);
            setTimeout(() => {
                map.setView([a.lat, a.lon], 18);
                const m = markers[a.id];
                if (m) {
                    if (isMobile()) openAddrPopup(a);
                    else { currentAddrId = a.id; m.unbindPopup(); m.bindPopup(createPopupHTML(a), { maxWidth: 260 }).openPopup(); }
                }
            }, 300);
        }
    }
});

searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
});

document.getElementById('btn-locate').addEventListener('click', function() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function(pos) {
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        // Trouver le bureau contenant cette position
        const pt = [lon, lat];
        for (const f of BUREAUX.features) {
            if (pointInPolygon(pt, f.geometry)) {
                const layer = findBureauLayer(f.properties.bureau);
                if (layer) zoomToBureau(f.properties.bureau, layer);
                setTimeout(() => map.setView([lat, lon], 18), 300);
                return;
            }
        }
        map.setView([lat, lon], 18);
    }, function() {
        alert('Impossible de vous géolocaliser.');
    }, { enableHighAccuracy: true });
});

function findBureauLayer(bureauId) {
    let found = null;
    if (!bureauLayer) return null;
    bureauLayer.eachLayer(function(l) {
        if (l.feature && l.feature.properties.bureau === bureauId) found = l;
    });
    return found;
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
    let pap = 0, boi = 0;
    Object.values(visites).forEach(v => {
        if (v.pap) pap += v.pap.count;
        if (v.boi) boi += v.boi.count;
    });
    document.getElementById('count-pap').textContent = pap;
    document.getElementById('count-boi').textContent = boi;
}

// ============================================================
// INIT
// ============================================================
async function init() {
    await Promise.all([loadAddresses(), loadBureaux(), loadVisites()]);
    precomputeBureaux();
    buildMap();
    updateStats();
}

init();
</script>
