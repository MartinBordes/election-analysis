<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Canvassing Nanterre — Porte-à-porte &amp; Boîtage</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', Arial, sans-serif; }
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

/* Barre de recherche */
#search-bar {
    position: fixed; top: 10px; left: 50px; right: 50px; z-index: 1000;
    display: flex; gap: 6px;
}
#search-input {
    flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px;
    font-size: 15px; font-family: inherit; background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
#search-input:focus { outline: none; border-color: #c62828; }
#btn-locate {
    width: 44px; height: 44px; border: none; border-radius: 8px;
    background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    font-size: 20px; cursor: pointer; flex-shrink: 0;
}

/* Compteurs */
#stats-bar {
    position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 1000;
    display: flex; gap: 8px; justify-content: center;
}
.stat-chip {
    background: white; padding: 6px 14px; border-radius: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15); font-size: 13px; font-weight: 600;
}
.stat-chip .num { font-size: 16px; font-weight: 700; }
.stat-chip.pap { color: #c62828; }
.stat-chip.boi { color: #1565c0; }

/* Popup adresse */
.addr-popup { font-family: 'Source Sans 3', Arial, sans-serif; min-width: 200px; }
.addr-popup h3 { font-size: 15px; margin-bottom: 8px; }
.addr-popup .btn-row { display: flex; gap: 6px; margin-top: 8px; }
.addr-popup .btn-action {
    flex: 1; padding: 10px 8px; border: 2px solid #ddd; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
    font-family: inherit; background: white; transition: all 0.15s;
}
.addr-popup .btn-action:active { transform: scale(0.96); }
.addr-popup .btn-action.pap { border-color: #ef9a9a; color: #c62828; }
.addr-popup .btn-action.pap.active { background: #c62828; color: white; border-color: #c62828; }
.addr-popup .btn-action.boi { border-color: #90caf9; color: #1565c0; }
.addr-popup .btn-action.boi.active { background: #1565c0; color: white; border-color: #1565c0; }

/* Légende filtre */
#filter-bar {
    position: fixed; top: 64px; left: 10px; z-index: 1000;
    background: white; border-radius: 8px; padding: 6px 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15); font-size: 12px;
    display: flex; flex-direction: column; gap: 4px;
}
#filter-bar label { cursor: pointer; display: flex; align-items: center; gap: 4px; }

/* Mobile overlay pour popup */
#mobile-overlay {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: white; z-index: 2000; border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2); padding: 20px;
    max-height: 50vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#mobile-overlay .mo-handle {
    width: 40px; height: 4px; background: #ddd; border-radius: 2px;
    margin: 0 auto 12px;
}
#mobile-overlay h3 { font-size: 18px; margin-bottom: 4px; }
#mobile-overlay .mo-addr { color: #888; font-size: 14px; margin-bottom: 12px; }
#mobile-overlay .btn-row { display: flex; gap: 10px; }
#mobile-overlay .btn-action {
    flex: 1; padding: 14px; border: 2px solid #ddd; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer; text-align: center;
    font-family: inherit; background: white;
}
#mobile-overlay .btn-action.pap { border-color: #ef9a9a; color: #c62828; }
#mobile-overlay .btn-action.pap.active { background: #c62828; color: white; }
#mobile-overlay .btn-action.boi { border-color: #90caf9; color: #1565c0; }
#mobile-overlay .btn-action.boi.active { background: #1565c0; color: white; }
#mobile-backdrop {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3); z-index: 1999;
}

/* Markers */
.marker-default { background: #999; border: 2px solid white; border-radius: 50%;
    width: 10px; height: 10px; margin: -5px 0 0 -5px; }
.marker-pap { background: #c62828; border: 2px solid white; border-radius: 50%;
    width: 12px; height: 12px; margin: -6px 0 0 -6px; }
.marker-boi { background: #1565c0; border: 2px solid white; border-radius: 50%;
    width: 12px; height: 12px; margin: -6px 0 0 -6px; }
.marker-both { background: #6a1b9a; border: 2px solid white; border-radius: 50%;
    width: 12px; height: 12px; margin: -6px 0 0 -6px; }
</style>
</head>
<body>

<div id="map"></div>

<div id="search-bar">
    <input id="search-input" type="text" placeholder="Rechercher une adresse...">
    <button id="btn-locate" title="Ma position">📍</button>
</div>

<div id="filter-bar">
    <label><input type="checkbox" id="show-todo" checked> <span style="color:#999;">&#9679;</span> À faire</label>
    <label><input type="checkbox" id="show-pap" checked> <span style="color:#c62828;">&#9679;</span> Porte-à-porte</label>
    <label><input type="checkbox" id="show-boi" checked> <span style="color:#1565c0;">&#9679;</span> Boîtage</label>
</div>

<div id="stats-bar">
    <div class="stat-chip pap"><span class="num" id="count-pap">0</span> porte-à-porte</div>
    <div class="stat-chip boi"><span class="num" id="count-boi">0</span> boîtage</div>
</div>

<div id="mobile-backdrop" onclick="closeMobilePopup()"></div>
<div id="mobile-overlay">
    <div class="mo-handle"></div>
    <h3 id="mo-title"></h3>
    <div class="mo-addr" id="mo-addr"></div>
    <div class="btn-row">
        <button class="btn-action pap" id="mo-btn-pap" onclick="toggleAction('pap')">
            Porte-à-porte
        </button>
        <button class="btn-action boi" id="mo-btn-boi" onclick="toggleAction('boi')">
            Boîtage
        </button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ============================================================
// CONFIG — Remplace ces valeurs avec tes clés Supabase
// ============================================================
const SUPABASE_URL = '';  // ex: 'https://xxxxx.supabase.co'
const SUPABASE_KEY = '';  // ex: 'eyJhbGci...'
const USE_SUPABASE = SUPABASE_URL && SUPABASE_KEY;

// ============================================================
// DONNÉES
// ============================================================
let ADDRESSES = [];
let visites = {};  // { address_id: { pap: bool, boi: bool } }
let markers = {};  // { address_id: L.marker }
let currentAddrId = null;
let map, clusterGroup;

// Charger les adresses
async function loadAddresses() {
    const resp = await fetch('adresses_nanterre.json');
    ADDRESSES = await resp.json();
}

// ============================================================
// PERSISTENCE — Supabase ou localStorage
// ============================================================
const LS_KEY = 'nanterre-canvassing';

async function loadVisites() {
    if (USE_SUPABASE) {
        try {
            const resp = await fetch(`${SUPABASE_URL}/rest/v1/visites?select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const rows = await resp.json();
            rows.forEach(r => {
                if (!visites[r.address_id]) visites[r.address_id] = {};
                visites[r.address_id][r.type] = true;
            });
        } catch(e) { console.error('Supabase load error:', e); loadFromLS(); }
    } else {
        loadFromLS();
    }
}

function loadFromLS() {
    try { visites = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { visites = {}; }
}

function saveToLS() {
    localStorage.setItem(LS_KEY, JSON.stringify(visites));
}

async function saveVisite(addrId, type, active) {
    if (!visites[addrId]) visites[addrId] = {};
    if (active) {
        visites[addrId][type] = true;
    } else {
        delete visites[addrId][type];
        if (Object.keys(visites[addrId]).length === 0) delete visites[addrId];
    }

    saveToLS();

    if (USE_SUPABASE) {
        try {
            if (active) {
                await fetch(`${SUPABASE_URL}/rest/v1/visites`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates'
                    },
                    body: JSON.stringify({ address_id: addrId, type: type, date: new Date().toISOString() })
                });
            } else {
                await fetch(`${SUPABASE_URL}/rest/v1/visites?address_id=eq.${addrId}&type=eq.${type}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
            }
        } catch(e) { console.error('Supabase save error:', e); }
    }

    updateMarkerStyle(addrId);
    updateStats();
}

// ============================================================
// CARTE
// ============================================================
function getMarkerClass(addrId) {
    const v = visites[addrId] || {};
    if (v.pap && v.boi) return 'marker-both';
    if (v.pap) return 'marker-pap';
    if (v.boi) return 'marker-boi';
    return 'marker-default';
}

function getMarkerStatus(addrId) {
    const v = visites[addrId] || {};
    if (v.pap && v.boi) return 'both';
    if (v.pap) return 'pap';
    if (v.boi) return 'boi';
    return 'todo';
}

function updateMarkerStyle(addrId) {
    const m = markers[addrId];
    if (!m) return;
    const cls = getMarkerClass(addrId);
    m.setIcon(L.divIcon({ className: cls }));
}

function isMobile() { return window.innerWidth <= 768; }

function openAddrPopup(addr) {
    currentAddrId = addr.id;
    const v = visites[addr.id] || {};

    if (isMobile()) {
        document.getElementById('mo-title').textContent = addr.adr;
        document.getElementById('mo-addr').textContent = addr.rue;
        document.getElementById('mo-btn-pap').classList.toggle('active', !!v.pap);
        document.getElementById('mo-btn-boi').classList.toggle('active', !!v.boi);
        document.getElementById('mobile-overlay').style.display = 'block';
        document.getElementById('mobile-backdrop').style.display = 'block';
    }
}

function closeMobilePopup() {
    document.getElementById('mobile-overlay').style.display = 'none';
    document.getElementById('mobile-backdrop').style.display = 'none';
    currentAddrId = null;
}

function toggleAction(type) {
    if (!currentAddrId) return;
    const v = visites[currentAddrId] || {};
    const newVal = !v[type];
    saveVisite(currentAddrId, type, newVal);

    // Mettre à jour les boutons
    if (isMobile()) {
        document.getElementById('mo-btn-' + type).classList.toggle('active', newVal);
    }
    // Mettre à jour le popup Leaflet si ouvert
    const m = markers[currentAddrId];
    if (m && m.getPopup() && m.getPopup().isOpen()) {
        const btn = m.getPopup().getElement().querySelector('.btn-action.' + type);
        if (btn) btn.classList.toggle('active', newVal);
    }
}

function createPopupHTML(addr) {
    const v = visites[addr.id] || {};
    return `<div class="addr-popup">
        <h3>${addr.adr}</h3>
        <div style="color:#888;font-size:13px;">${addr.rue}</div>
        <div class="btn-row">
            <button class="btn-action pap ${v.pap ? 'active' : ''}"
                onclick="currentAddrId='${addr.id}';toggleAction('pap');
                         this.classList.toggle('active');">Porte-à-porte</button>
            <button class="btn-action boi ${v.boi ? 'active' : ''}"
                onclick="currentAddrId='${addr.id}';toggleAction('boi');
                         this.classList.toggle('active');">Boîtage</button>
        </div>
    </div>`;
}

function buildMap() {
    map = L.map('map', { zoomControl: false }).setView([48.8925, 2.2052], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap, &copy; CARTO', maxZoom: 19
    }).addTo(map);

    clusterGroup = L.markerClusterGroup({
        maxClusterRadius: 40,
        disableClusteringAtZoom: 17,
        spiderfyOnMaxZoom: false
    });

    ADDRESSES.forEach(addr => {
        const cls = getMarkerClass(addr.id);
        const m = L.marker([addr.lat, addr.lon], {
            icon: L.divIcon({ className: cls })
        });

        m.on('click', function() {
            if (isMobile()) {
                openAddrPopup(addr);
            } else {
                currentAddrId = addr.id;
                m.bindPopup(createPopupHTML(addr), { maxWidth: 250 }).openPopup();
            }
        });

        m.addr = addr;
        markers[addr.id] = m;
        clusterGroup.addLayer(m);
    });

    map.addLayer(clusterGroup);
}

// ============================================================
// FILTRES
// ============================================================
function applyFilters() {
    const showTodo = document.getElementById('show-todo').checked;
    const showPap = document.getElementById('show-pap').checked;
    const showBoi = document.getElementById('show-boi').checked;

    Object.entries(markers).forEach(([id, m]) => {
        const status = getMarkerStatus(id);
        let visible = false;
        if (status === 'todo' && showTodo) visible = true;
        if (status === 'pap' && showPap) visible = true;
        if (status === 'boi' && showBoi) visible = true;
        if (status === 'both' && (showPap || showBoi)) visible = true;

        if (visible && !clusterGroup.hasLayer(m)) clusterGroup.addLayer(m);
        if (!visible && clusterGroup.hasLayer(m)) clusterGroup.removeLayer(m);
    });
}

document.getElementById('show-todo').addEventListener('change', applyFilters);
document.getElementById('show-pap').addEventListener('change', applyFilters);
document.getElementById('show-boi').addEventListener('change', applyFilters);

// ============================================================
// RECHERCHE
// ============================================================
const searchInput = document.getElementById('search-input');
let searchResults = [];

searchInput.addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (q.length < 2) return;

    searchResults = ADDRESSES.filter(a =>
        a.adr.toLowerCase().includes(q)
    ).slice(0, 5);

    // Simple: zoom sur le premier résultat
    if (searchResults.length > 0) {
        const a = searchResults[0];
        map.setView([a.lat, a.lon], 18);
        const m = markers[a.id];
        if (m) {
            clusterGroup.zoomToShowLayer(m, function() {
                if (isMobile()) openAddrPopup(a);
                else { currentAddrId = a.id; m.bindPopup(createPopupHTML(a), { maxWidth: 250 }).openPopup(); }
            });
        }
    }
});

searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        searchInput.blur();
    }
});

// Géolocalisation
document.getElementById('btn-locate').addEventListener('click', function() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            map.setView([pos.coords.latitude, pos.coords.longitude], 18);
        }, function() {
            alert('Impossible de vous géolocaliser.');
        }, { enableHighAccuracy: true });
    }
});

// ============================================================
// STATS
// ============================================================
function updateStats() {
    let pap = 0, boi = 0;
    Object.values(visites).forEach(v => {
        if (v.pap) pap++;
        if (v.boi) boi++;
    });
    document.getElementById('count-pap').textContent = pap;
    document.getElementById('count-boi').textContent = boi;
}

// ============================================================
// INIT
// ============================================================
async function init() {
    await loadAddresses();
    await loadVisites();
    buildMap();
    updateStats();
}

init();
</script>
</body>
</html>
